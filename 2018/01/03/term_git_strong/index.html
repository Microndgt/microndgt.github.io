e">75</div><div class="line">76</div><div class="line">77</div><div class="line">78</div><div class="line">79</div><div class="line">80</div></pre></td><td class="code"><pre><div class="line">#Git branch status</div><div class="line">function git_status &#123;</div><div class="line">  local unknown untracked stash clean ahead behind staged dirty diverged</div><div class="line">  unknown=&apos;0;34&apos; # blue</div><div class="line">  untracked=&apos;0;32&apos; # green</div><div class="line">  stash=&apos;0;32&apos; # green</div><div class="line">  clean=&apos;0;32&apos; # green</div><div class="line">  ahead=&apos;0;33&apos; # yellow</div><div class="line">  behind=&apos;0;33&apos; # yellow</div><div class="line">  staged=&apos;0;96&apos; # cyan</div><div class="line">  dirty=&apos;0;31&apos; # red</div><div class="line">  diverged=&apos;0;31&apos; # red</div><div class="line"></div><div class="line">  if [[ $TERM = *256color ]]; then</div><div class="line">    unknown=&apos;38;5;20&apos; # dark blue</div><div class="line">    untracked=&apos;38;5;76&apos; # mid lime-green</div><div class="line">    stash=&apos;38;5;76&apos; # mid lime-green</div><div class="line">    clean=&apos;38;5;82&apos; # brighter green</div><div class="line">    ahead=&apos;38;5;226&apos; # bright yellow</div><div class="line">    behind=&apos;38;5;142&apos; # darker yellow-orange</div><div class="line">    staged=&apos;38;5;214&apos; # orangey yellow</div><div class="line">    dirty=&apos;38;5;202&apos; # orange</div><div class="line">    diverged=&apos;38;5;196&apos; # red</div><div class="line">  fi</div><div class="line"></div><div class="line">  branch=$(git rev-parse --abbrev-ref HEAD 2&gt;/dev/null)</div><div class="line">  if [[ -n &quot;$branch&quot; ]]; then</div><div class="line">    if [[ &quot;$branch&quot; == &apos;HEAD&apos; ]]; then</div><div class="line">      branch=$(git rev-parse --short HEAD 2&gt;/dev/null)</div><div class="line">    fi</div><div class="line">    git_status=$(git status 2&gt; /dev/null)</div><div class="line">    # If nothing changes the color, we can spot unhandled cases.</div><div class="line">    color=$unknown</div><div class="line">    if [[ $git_status =~ &apos;Untracked files&apos; ]]; then</div><div class="line">      color=$untracked</div><div class="line">      branch=&quot;$&#123;branch&#125;+&quot;</div><div class="line">    fi</div><div class="line">    if git stash show &amp;&gt;/dev/null; then</div><div class="line">      color=$stash</div><div class="line">      branch=&quot;$&#123;branch&#125;*&quot;</div><div class="line">    fi</div><div class="line">    if [[ $git_status =~ &apos;working directory clean&apos; ]]; then</div><div class="line">      color=$clean</div><div class="line">    fi</div><div class="line">    if [[ $git_status =~ &apos;Your branch is ahead&apos; ]]; then</div><div class="line">      color=$ahead</div><div class="line">      branch=&quot;$&#123;branch&#125;&quot;</div><div class="line">    fi</div><div class="line">    if [[ $git_status =~ &apos;Your branch is behind&apos; ]]; then</div><div class="line">      color=$behind</div><div class="line">      branch=&quot;$&#123;branch&#125;&quot;</div><div class="line">    fi</div><div class="line">    if [[ $git_status =~ &apos;Changes to be committed&apos; ]]; then</div><div class="line">      color=$staged</div><div class="line">    fi</div><div class="line">    if [[ $git_status =~ &apos;Changed but not updated&apos; ||</div><div class="line">          $git_status =~ &apos;Changes not staged&apos;      ||</div><div class="line">          $git_status =~ &apos;Unmerged paths&apos; ]]; then</div><div class="line">      color=$dirty</div><div class="line">    fi</div><div class="line">    if [[ $git_status =~ &apos;Your branch&apos;.+diverged ]]; then</div><div class="line">      color=$diverged</div><div class="line">      branch=&quot;$&#123;branch&#125;!&quot;</div><div class="line">    fi</div><div class="line">    printf &quot;\033[%sm%s\033[0m&quot; &quot;$color&quot; &quot;($branch)&quot;</div><div class="line">  fi</div><div class="line">  return 0</div><div class="line">&#125;</div><div class="line"></div><div class="line">#bles colorin the terminal bash shell export</div><div class="line">export CLICOLOR=1</div><div class="line"></div><div class="line">#sets up thecolor scheme for list export</div><div class="line">export LSCOLORS=gxfxcxdxbxegedabagacad</div><div class="line"></div><div class="line">#sets up theprompt color (currently a green similar to linux terminal)</div><div class="line">export PS1=&apos;\[\033[01;32m\]\u@\h\[\033[00m\]:\[\033[01;36m\]\w\[\033[01;31m\]$(git_status)\[\033[0m\]\$ &apos;</div><div class="line"></div><div class="line">#enables colorfor iTerm</div><div class="line">export TERM=xterm-256color</div></pre></td></tr></table></figure>
